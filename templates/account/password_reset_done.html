{% extends "base.html" %}

{% block title %}Enlace enviado – BarberSync{% endblock %}

{% block public_content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm space-y-6 text-center">
        <div class="w-16 h-16 bg-green-900/50 rounded-2xl flex items-center justify-center mx-auto">
            <svg class="w-8 h-8 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
        </div>
        <h1 class="font-heading font-bold text-2xl text-white">Revisa tu correo</h1>
        <p class="text-sm text-neutral-400">
            Si existe una cuenta con ese correo, te hemos enviado un enlace para restablecer tu contraseña.
        </p>
        <a href="{% url 'account_login' %}" class="btn-primary inline-block">
            Volver al login
        </a>
    </div>
</div>
{% endblock %}
