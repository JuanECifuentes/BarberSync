{% extends "base.html" %}

{% block title %}Contraseña actualizada – BarberSync{% endblock %}

{% block public_content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm space-y-6 text-center">
        <div class="w-16 h-16 bg-green-900/50 rounded-2xl flex items-center justify-center mx-auto">
            <svg class="w-8 h-8 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
        </div>
        <h1 class="font-heading font-bold text-2xl text-white">¡Contraseña actualizada!</h1>
        <p class="text-sm text-neutral-400">Tu contraseña ha sido restablecida exitosamente.</p>
        <a href="{% url 'account_login' %}" class="btn-primary inline-block">
            Iniciar sesión
        </a>
    </div>
</div>
{% endblock %}
