{% extends "base.html" %}
{% load static %}

{% block title %}Agenda – BarberSync{% endblock %}

{% block page_title %}Agenda{% endblock %}

{% block extra_head %}
<!-- FullCalendar -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.11/locales/es.global.min.js"></script>
{% endblock %}

{% block content %}
<div class="space-y-4">

    <!-- Filters bar -->
    <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3">
        {% if not is_barber %}
        <div class="flex items-center gap-3">
            <label for="barber-filter" class="text-sm text-neutral-400">Barbero:</label>
            <select id="barber-filter"
                    class="bg-neutral-900 border border-neutral-700 text-white text-sm rounded-lg px-3 py-2
                           focus:ring-brand focus:border-brand transition-colors">
                <option value="">Todos</option>
                {% for barber in barbers %}
                <option value="{{ barber.pk }}"
                    {% if selected_barber_id == barber.pk %}selected{% endif %}>
                    {{ barber }}
                </option>
                {% endfor %}
            </select>
        </div>
        {% endif %}

        <button onclick="openNewAppointment()"
                class="btn-primary text-sm flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Nueva cita
        </button>
    </div>

    <!-- Calendar container -->
    <div id="calendar" class="card !p-2 sm:!p-4"></div>
</div>

<!-- Appointment detail modal -->
<div id="apt-modal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/70" onclick="closeModal()"></div>
    <div class="absolute bottom-0 sm:bottom-auto sm:top-1/2 sm:left-1/2 sm:-translate-x-1/2 sm:-translate-y-1/2
                w-full sm:max-w-md bg-neutral-900 border border-neutral-700 rounded-t-2xl sm:rounded-2xl
                shadow-2xl max-h-[85vh] overflow-y-auto">
        <div class="p-5 space-y-4">
            <div class="flex items-center justify-between">
                <h3 id="modal-title" class="font-heading font-bold text-lg text-white"></h3>
                <button onclick="closeModal()" class="p-1 text-neutral-400 hover:text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div id="modal-body" class="space-y-3 text-sm text-neutral-300"></div>
            <div id="modal-actions" class="flex gap-2 pt-2"></div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const calendarEl = document.getElementById('calendar');
    const barberFilter = document.getElementById('barber-filter');

    const calendar = new FullCalendar.Calendar(calendarEl, {
        locale: 'es',
        initialView: window.innerWidth < 768 ? 'listWeek' : 'timeGridWeek',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: window.innerWidth < 768
                ? 'listWeek,timeGridDay'
                : 'dayGridMonth,timeGridWeek,timeGridDay,listWeek'
        },
        slotMinTime: '{{ current_barbershop.open_hour|default:"08" }}:00:00',
        slotMaxTime: '{{ current_barbershop.close_hour|default:"20" }}:00:00',
        allDaySlot: false,
        nowIndicator: true,
        expandRows: true,
        stickyHeaderDates: true,
        navLinks: true,
        editable: false,
        selectable: false,
        slotDuration: '00:30:00',
        height: 'auto',

        // Event source: fetches from our API
        events: function(info, successCallback, failureCallback) {
            const params = new URLSearchParams({
                start: info.startStr,
                end: info.endStr,
            });
            if (barberFilter && barberFilter.value) {
                params.set('barber_id', barberFilter.value);
            }
            fetch(`{% url 'scheduling:api_events' %}?${params}`)
                .then(res => res.json())
                .then(data => successCallback(data))
                .catch(err => failureCallback(err));
        },

        eventClick: function(info) {
            const props = info.event.extendedProps;
            document.getElementById('modal-title').textContent = info.event.title;
            document.getElementById('modal-body').innerHTML = `
                <div class="grid grid-cols-2 gap-2">
                    <div><span class="text-neutral-500">Cliente:</span> ${props.client_name}</div>
                    <div><span class="text-neutral-500">Teléfono:</span> ${props.client_phone || '—'}</div>
                    <div><span class="text-neutral-500">Barbero:</span> ${props.barber_name}</div>
                    <div><span class="text-neutral-500">Estado:</span>
                        <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium
                            ${props.status === 'confirmed' ? 'bg-blue-900/50 text-blue-300' :
                              props.status === 'pending' ? 'bg-amber-900/50 text-amber-300' :
                              props.status === 'completed' ? 'bg-green-900/50 text-green-300' :
                              'bg-neutral-800 text-neutral-400'}">
                            ${props.status_display}
                        </span>
                    </div>
                </div>
                <div><span class="text-neutral-500">Servicios:</span> ${props.services}</div>
                <div class="text-lg font-heading font-bold text-brand">$${Math.round(parseFloat(props.total_price || 0)).toLocaleString('de-DE')}</div>
                ${props.notes ? `<div class="text-neutral-500 italic">${props.notes}</div>` : ''}
            `;

            const actionsEl = document.getElementById('modal-actions');
            const aptId = info.event.id;
            if (['pending', 'confirmed'].includes(props.status)) {
                actionsEl.innerHTML = `
                    <button onclick="appointmentAction(${aptId}, 'complete')" class="btn-primary text-sm flex-1">Completar</button>
                    <button onclick="appointmentAction(${aptId}, 'cancel')" class="btn-ghost text-sm text-red-400 flex-1">Cancelar</button>
                `;
            } else {
                actionsEl.innerHTML = '';
            }

            document.getElementById('apt-modal').classList.remove('hidden');
        },

        // Styling
        eventDidMount: function(info) {
            info.el.style.borderLeft = `3px solid ${info.event.backgroundColor}`;
            info.el.style.borderRadius = '6px';
        },
    });

    calendar.render();

    // Re-fetch on barber filter change
    if (barberFilter) {
        barberFilter.addEventListener('change', () => calendar.refetchEvents());
    }

    // Responsive view switch
    window.addEventListener('resize', () => {
        if (window.innerWidth < 768) {
            calendar.changeView('listWeek');
        }
    });

    // Global functions
    window.appointmentAction = function(aptId, action) {
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]')?.value
            || '{{ csrf_token }}';

        fetch(`/app/schedule/api/appointments/${aptId}/action/`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken,
            },
            body: JSON.stringify({ action }),
        })
        .then(res => res.json())
        .then(data => {
            closeModal();
            calendar.refetchEvents();
        });
    };

    window.openNewAppointment = function() {
        // TODO: open appointment creation form/modal
        alert('Próximamente: formulario de nueva cita');
    };
});

function closeModal() {
    document.getElementById('apt-modal').classList.add('hidden');
}
</script>
{% endblock %}
