{% load static %}
<!-- Mobile overlay -->
<div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-30 lg:hidden hidden" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<aside id="sidebar"
       class="fixed inset-y-0 left-0 z-40 w-64 bg-neutral-900 border-r border-neutral-800
              transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-out
              flex flex-col">

    <!-- Logo -->
    <div class="flex items-center gap-3 px-5 py-5 border-b border-neutral-800">
        <div class="w-9 h-9 bg-brand rounded-lg flex items-center justify-center">
            <span class="text-white font-heading font-bold text-lg">B</span>
        </div>
        <span class="font-heading font-bold text-xl text-white tracking-tight">BarberSync</span>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
        <a href="{% url 'scheduling:calendar' %}"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium
                  {% if request.resolver_match.app_name == 'scheduling' %}bg-brand/10 text-brand{% else %}text-neutral-400 hover:text-white hover:bg-neutral-800{% endif %}
                  transition-all duration-150">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            Agenda
        </a>

        <a href="{% url 'clients:list' %}"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium
                  {% if request.resolver_match.app_name == 'clients' %}bg-brand/10 text-brand{% else %}text-neutral-400 hover:text-white hover:bg-neutral-800{% endif %}
                  transition-all duration-150">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
            Clientes
        </a>

        <a href="{% url 'inventory:list' %}"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium
                  {% if request.resolver_match.app_name == 'inventory' %}bg-brand/10 text-brand{% else %}text-neutral-400 hover:text-white hover:bg-neutral-800{% endif %}
                  transition-all duration-150">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/>
            </svg>
            Inventario
        </a>

        <a href="{% url 'finance:dashboard' %}"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium
                  {% if request.resolver_match.app_name == 'finance' %}bg-brand/10 text-brand{% else %}text-neutral-400 hover:text-white hover:bg-neutral-800{% endif %}
                  transition-all duration-150">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
            </svg>
            Finanzas
        </a>

        <a href="{% url 'intervenciones:list' %}"
           class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium
                  {% if request.resolver_match.app_name == 'intervenciones' %}bg-brand/10 text-brand{% else %}text-neutral-400 hover:text-white hover:bg-neutral-800{% endif %}
                  transition-all duration-150">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                      d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
            </svg>
            Intervenciones
        </a>

        {% if is_admin %}
        <div class="pt-4 mt-4 border-t border-neutral-800">
            <p class="px-3 mb-2 text-xs font-semibold text-neutral-500 uppercase tracking-wider">Admin</p>
            <a href="{% url 'scheduling:services' %}"
               class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-neutral-400 hover:text-white hover:bg-neutral-800 transition-all duration-150">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                          d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                </svg>
                Servicios
            </a>
        </div>
        {% endif %}
    </nav>

    <!-- Barbershop switcher (for owners/admins with multiple locations) -->
    {% if is_admin and current_organization %}
    <div class="px-3 py-3 border-t border-neutral-800">
        <p class="px-2 mb-1 text-xs text-neutral-500">Sucursal activa</p>
        <div class="px-2 py-1.5 text-sm font-medium text-brand truncate">
            {{ current_barbershop.name|default:"Todas" }}
        </div>
    </div>
    {% endif %}
</aside>

<script>
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    sidebar.classList.toggle('-translate-x-full');
    overlay.classList.toggle('hidden');
}
</script>
