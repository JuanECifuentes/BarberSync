<!-- Top navbar -->
<header class="sticky top-0 z-20 bg-neutral-900/80 backdrop-blur-md border-b border-neutral-800">
    <div class="flex items-center justify-between px-4 py-3 lg:px-6">
        <!-- Mobile menu button -->
        <button onclick="toggleSidebar()"
            class="lg:hidden p-2 -ml-2 rounded-lg text-neutral-400 hover:text-white hover:bg-neutral-800 transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </button>

        <!-- Page title -->
        <h1 class="font-heading font-bold text-lg lg:text-xl text-white">
            {% block page_title %}BarberSync{% endblock %}
        </h1>

        <!-- Right actions -->
        <div class="flex items-center gap-3">
            <!-- Booking link share -->
            {% if is_admin and current_barbershop %}
            <button onclick="copyBookingLink(this)"
                class="hidden sm:flex items-center gap-2 px-3 py-1.5 text-xs font-medium text-brand bg-brand/10 rounded-full hover:bg-brand/20 transition-colors"
                title="Copiar link de reservas">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
                </svg>
                Link de reservas
            </button>
            {% endif %}

            <!-- User menu -->
            <div class="relative" x-data="{ open: false }">
                <button id="user-menu-btn" onclick="document.getElementById('user-dropdown').classList.toggle('hidden')"
                    class="flex items-center gap-2 p-1.5 rounded-lg hover:bg-neutral-800 transition-colors">
                    <div class="w-8 h-8 bg-brand/20 rounded-full flex items-center justify-center">
                        <span class="text-sm font-semibold text-brand">
                            {{ user.first_name|first|default:user.email|first|upper }}
                        </span>
                    </div>
                    <span class="hidden sm:block text-sm font-medium text-neutral-300 max-w-[120px] truncate">
                        {{ user.first_name|default:user.email }}
                    </span>
                </button>

                <div id="user-dropdown"
                    class="hidden absolute right-0 mt-2 w-48 bg-neutral-900 border border-neutral-700 rounded-xl shadow-xl py-1 z-50">
                    <a href="{% url 'accounts:profile' %}"
                        class="block px-4 py-2 text-sm text-neutral-300 hover:bg-neutral-800 hover:text-white transition-colors">
                        Mi perfil
                    </a>
                    <hr class="border-neutral-800 my-1">
                    <a href="{% url 'account_logout' %}"
                        class="block px-4 py-2 text-sm text-red-400 hover:bg-neutral-800 transition-colors">
                        Cerrar sesión
                    </a>
                </div>
            </div>
        </div>
    </div>
</header>

{% if is_admin and current_barbershop %}
<script>
    function copyBookingLink(btn) {
        const url = window.location.origin + '{{ current_barbershop.get_booking_url }}';
        navigator.clipboard.writeText(url).then(() => {
            const original = btn.innerHTML;
            btn.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Copiado';
            setTimeout(() => btn.innerHTML = original, 2000);
        });
    }
</script>
{% endif %}
